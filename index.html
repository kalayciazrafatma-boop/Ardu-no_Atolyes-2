<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Gerçek Zamanlı Atölye Masası</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="workbench">
            <header>
                <h1>Arduino Deney Masası</h1>
                <p class="subtitle">Masadan bir malzeme seç ve projene ekle</p>
            </header>
            
            <div id="materials-list" class="material-list-container">
                <div class="loading">Envanter masaya diziliyor...</div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="status-section">
                <h3>SİSTEM DURUMU</h3>
                <div id="api-status" class="terminal-text">> Başlatılıyor...</div>
            </div>
            
            <div class="project-section">
                <h3>AKTİF PROJE</h3>
                <ul id="selected-items-list" class="active-project-list">
                    <li class="empty-msg">Proje tahtası boş. Masadan malzeme seçin.</li>
                </ul>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
