<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Maker Studio Pro | Billy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- SOL PANEL: 58 Parçalık Malzeme Çantası -->
        <aside class="sidebar">
            <div class="logo">ARDUINO PRO LAB</div>
            <div class="search-box">
                <input type="text" id="partSearch" placeholder="Parça ara (Sensör, Motor...)" onkeyup="searchParts()">
            </div>
            <h3>MALZEME ENVANTERİ</h3>
            <div id="inventory-list" class="inventory-grid">
                <!-- 58 Parça JS ile yüklenecek -->
            </div>
        </aside>

        <!-- ANA ALAN: Deney Masası -->
        <main class="workbench">
            <div class="hud-display">
                <div class="status-panel">
                    <div class="hud-line">SİSTEM: <span id="sys-status" class="neon-text">HAZIR</span></div>
                    <div class="hud-line">MASADA: <span id="part-count">0</span> PARÇA</div>
                </div>
                <div class="project-panel">
                    <h4>ÜRETİLEBİLİR PROJELER</h4>
                    <div id="project-links">
                        <p class="hint">Parçaları ekle, projelerin kilidini aç!</p>
                    </div>
                </div>
            </div>
            
            <div id="table-canvas" class="grid-table">
                <div class="watermark">BILLY VIRTUAL ROBOTICS AREA</div>
            </div>
        </main>
    </div>

    <!-- LEGO STİLİ YAPIM KILAVUZU (MODAL) -->
    <div id="manual-modal" class="modal">
        <div class="manual-book">
            <span class="close-manual" onclick="closeManual()">&times;</span>
            <header class="manual-header">
                <div class="manual-id">SORBIL BUILD GUIDE #2024-V2</div>
                <h2 id="m-project-name">PROJE ADI</h2>
            </header>
            <div class="manual-body">
                <div class="manual-visual">
                    <img id="m-project-img" src="" alt="Devre Şeması">
                </div>
                <div class="manual-steps">
                    <h3>MONTAJ VE KODLAMA REHBERİ</h3>
                    <div class="step-content">
                        <p id="m-project-steps"></p>
                    </div>
                </div>
            </div>
            <footer class="manual-footer">
                <h3>BU PROJE İÇİN GEREKLİ TÜM PARÇALAR</h3>
                <div id="m-project-parts" class="parts-tag-cloud"></div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
